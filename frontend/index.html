<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DR.TAGGER</title>
    <link rel="icon" type="image/png" href="logo.png?v=4">
    <link rel="stylesheet" href="style.css?v=15">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Space+Grotesk:wght@300;400;500;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header class="fade-in">
            <div class="header-main">
                <div class="header-left">
                    <h1>DR.TAGGER</h1>
                    <p class="subtitle">treats your broken tags</p>
                </div>
                <div class="header-right">
                    <img src="logo.png?v=4" alt="DR.TAGGER Logo" class="header-logo">
                </div>
            </div>
        </header>

        <main>
            <section class="card fade-in" style="animation-delay: 0.1s;">
                <div class="controls" id="main-controls">
                    <button id="scan-btn" class="primary">Start Scan</button>
                    <button id="autotag-btn" class="secondary" disabled>Write Tags</button>
                    <button id="clear-btn">Clear List</button>
                    <button id="restore-btn" disabled>Restore</button>
                </div>

                <div class="controls" id="restore-controls" style="display: none;">
                    <button id="restore-accept-btn" class="primary">Accept Restore</button>
                    <button id="restore-cancel-btn">Cancel</button>
                </div>

                <div class="progress-container">
                    <div class="progress-bar-bg">
                        <div id="progress-bar"></div>
                    </div>
                    <div class="status-text">
                        <span id="status-label">Ready to scan...</span>
                        <span id="progress-text">0 / 0</span>
                    </div>
                </div>
            </section>

            <section class="card fade-in" style="animation-delay: 0.2s;">
                <div class="card-header">
                    <h2>Tracklist</h2>
                    <div class="search-wrap">
                        <span class="search-icon">⌕</span>
                        <input type="text" id="search-input" placeholder="Filter tracks..." autocomplete="off" />
                    </div>
                </div>
                
                <table class="track-list">
                    <thead>
                        <tr>
                            <th></th>
                            <th>File</th>
                            <th>Status</th>
                            <th>Before (Current Tags)</th>
                            <th>After (Parsed Results)</th>
                            <th>Genre</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody id="track-items">
                        <!-- Tracks will be injected here -->
                    </tbody>
                </table>
            </section>
        </main>
    </div>

    <!-- ─── FOOTER PLAYER ─── -->
    <footer id="player-bar">
        <div class="player-left">
            <canvas id="eq-canvas" width="80" height="36"></canvas>
            <div id="player-track-info">
                <div id="player-title">&mdash; No track playing &mdash;</div>
                <div id="player-artist" class="player-meta"></div>
            </div>
            <img id="player-cover" class="player-cover" src="" alt="" />
        </div>

        <div class="player-center">
            <button id="player-prev" class="player-ctrl" title="Previous">&#9664;&#9664;</button>
            <button id="player-play" class="player-ctrl player-play-main" title="Play/Pause">&#9654;</button>
            <button id="player-next" class="player-ctrl" title="Next">&#9654;&#9654;</button>
            <div class="player-progress-wrap">
                <div class="player-progress-bg" id="player-progress-bg">
                    <div id="player-progress-fill"></div>
                </div>
                <span id="player-time" class="player-time">0:00 / 0:00</span>
            </div>
        </div>

        <div class="player-right">
            <!-- Search filter moved to Tracklist header -->
        </div>
    </footer>

    <!-- ─── MODAL ─── -->
    <div id="modal-overlay" class="modal-overlay">
        <div class="modal">
            <div class="modal-header">
                <h2>Tag Details</h2>
                <div class="modal-actions">
                    <button id="edit-tag-btn" class="icon-btn" title="Edit Tags">✎</button>
                    <button id="close-modal">&times;</button>
                </div>
            </div>
            <div class="modal-content">
                <input type="hidden" id="modal-track-id" />
                <table class="comparison-table">
                    <thead>
                        <tr>
                            <th>Field</th>
                            <th>Before</th>
                            <th>After</th>
                        </tr>
                    </thead>
                    <tbody id="modal-comparison-body">
                        <!-- Comparison rows injected here -->
                    </tbody>
                </table>
                <div class="modal-footer" id="modal-edit-footer" style="display: none;">
                    <button id="save-tag-btn" class="primary">Save Tags</button>
                    <button id="cancel-tag-btn">Cancel</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Manual Search Modal -->
    <div id="search-modal" class="modal-overlay">
        <div class="modal search-modal">
            <div class="modal-header">
                <h2>MANUAL SEARCH</h2>
                <button id="close-search-modal">&times;</button>
            </div>
            <div class="modal-content">
                <div class="search-bar">
                    <input type="text" id="manual-search-input" placeholder="Artist - Title..." />
                    <button id="execute-search-btn" class="primary">Search</button>
                </div>
                <div id="search-results-container" class="search-results">
                    <!-- Results will be injected here -->
                    <div class="search-placeholder">Enter artist and title to search...</div>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js?v=2"></script>
</body>
</html>
